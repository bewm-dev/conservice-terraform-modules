# =============================================================================
# Application Infrastructure Config
#
# Edit this file to define what AWS resources your app needs.
# Uncomment sections you need. Unused sections are ignored.
#
# Resource naming (automatic):
#   S3 buckets:  conservice-{env}-{app_name}-{key}
#   SQS queues:  csvc-{env}-{region}-{app_name}-{key}-queue
#   SNS topics:  csvc-{env}-{region}-{app_name}-{key}-topic
#   Secrets:     conservice-{env}-{app_name}-{key}
#   Databases:   {key} (database name in shared Aurora cluster)
# =============================================================================

# Required: identifies your app and team
name: my-app
team: my-team
domain: billing
portfolio: billing

# -----------------------------------------------------------------------------
# Databases — PostgreSQL inside shared Aurora cluster (IAM auth, no passwords)
# -----------------------------------------------------------------------------
# databases:
#   my_app:                                   # database name in Aurora
#     service_role: my-app-svc                # IAM role for app pods (auto-created)
#     team_role: my-team-read                 # optional: read-only role for your team
#     extensions: [pgcrypto, uuid-ossp]       # optional: PostgreSQL extensions
#     admin_users: [jane.smith]               # optional: individual admin access (Google username)
#     readonly_users: [bob.jones]             # optional: individual read-only access

# -----------------------------------------------------------------------------
# S3 Buckets — KMS encrypted, public access blocked, versioning on by default
# -----------------------------------------------------------------------------
# buckets:
#   data: {}                                  # defaults: versioning on
#   exports:
#     versioning: false                       # override: disable versioning

# -----------------------------------------------------------------------------
# SQS Queues — encrypted, dead-letter queue auto-created
# -----------------------------------------------------------------------------
# queues:
#   events: {}                                # defaults: DLQ on, 30s visibility, 4-day retention
#   notifications:
#     visibility_timeout: 60                  # seconds before message reappears (default: 30)
#     retention_seconds: 86400                # message TTL in seconds (default: 345600 = 4 days)
#     max_receive_count: 3                    # retries before DLQ (default: 5)
#     dlq: false                              # disable DLQ for this queue

# -----------------------------------------------------------------------------
# SNS Topics — KMS encrypted
# -----------------------------------------------------------------------------
# topics:
#   alerts: {}
#   notifications: {}

# -----------------------------------------------------------------------------
# Secrets — creates empty containers in AWS Secrets Manager
# Values are added via CLI or console after creation.
# ESO syncs these into K8s pods automatically.
# -----------------------------------------------------------------------------
# secrets:
#   api-keys:
#     description: "External API keys for third-party integrations"
#   config:
#     description: "Application configuration values"
